name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"          # only run when the backend changes

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Zip the code
        run: zip -r ../function.zip . -x ".env"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload artifact to S3
        run: aws s3 cp ../function.zip s3://${{ secrets.ARTIFACTS_BUCKET }}/function.zip

      - name: Update the Lambda function
        run: >
          aws lambda update-function-code
          --function-name edureach-api
          --s3-bucket ${{ secrets.ARTIFACTS_BUCKET }}
          --s3-key function.zip